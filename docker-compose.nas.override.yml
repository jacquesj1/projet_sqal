# ==============================================================================
# NAS Override - Système Gaveurs V3.0
# ==============================================================================
# Ce fichier est automatiquement détecté et appliqué par le workflow GitOps.
# Il surcharge docker-compose.yml avec des paramètres adaptés au NAS
# (timeouts plus longs, mémoire réduite, simulateurs optionnels).
#
# Usage (automatique via workflow):
#   docker compose -f docker-compose.yml -f docker-compose.nas.override.yml up -d
# ==============================================================================

services:

  # Backend: start_period plus long sur NAS (CPU lent + DB init) + CORS NAS
  backend:
    environment:
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:5173,http://localhost:5174,http://192.168.1.103:3001,http://192.168.1.103:3002,http://192.168.1.103:3003,http://192.168.1.103:5173,http://192.168.1.103:5174,http://deep_nas:3001,http://deep_nas:3002,http://deep_nas:3003,http://deep_nas:5173,http://deep_nas:5174"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 15s
      retries: 8
      start_period: 180s

  # Simulateurs: les rendre optionnels sur NAS (pas critiques pour la demo)
  # Ils ne bloquent plus le deploiement si le backend tarde a demarrer
  simulator-sqal:
    depends_on:
      backend:
        condition: service_started   # service_started = ne pas attendre healthy
    restart: on-failure

  simulator-consumer:
    depends_on:
      backend:
        condition: service_started
    restart: on-failure

  simulator-gavage-realtime:
    depends_on:
      backend:
        condition: service_started
    restart: on-failure

  # Celery worker/beat: aussi en service_started pour eviter blocage
  celery-worker:
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Frontends: API URL pointant vers le NAS (accessible depuis le navigateur)
  # NEXT_PUBLIC_* est embarqué au BUILD (pas runtime) → doit être l'IP NAS
  frontend-gaveurs:
    build:
      context: ./gaveurs-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://192.168.1.103:8001
        NEXT_PUBLIC_WS_URL: ws://192.168.1.103:8001
    environment:
      NEXT_PUBLIC_API_URL: http://192.168.1.103:8001
      NEXT_PUBLIC_WS_URL: ws://192.168.1.103:8001

  frontend-euralis:
    build:
      context: ./euralis-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://192.168.1.103:8001
    environment:
      NEXT_PUBLIC_API_URL: http://192.168.1.103:8001

  frontend-traceability:
    build:
      context: ./frontend-traceability
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://192.168.1.103:8001
    environment:
      NEXT_PUBLIC_API_URL: http://192.168.1.103:8001

  frontend-sqal:
    build:
      context: ./sqal
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://192.168.1.103:8001
        VITE_WS_URL: ws://192.168.1.103:8001
    environment:
      VITE_API_URL: http://192.168.1.103:8001
      VITE_WS_URL: ws://192.168.1.103:8001

  control-panel:
    build:
      context: ./control-panel-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://192.168.1.103:8001
        VITE_WS_URL: ws://192.168.1.103:8001
    environment:
      VITE_API_URL: http://192.168.1.103:8001
      VITE_WS_URL: ws://192.168.1.103:8001
