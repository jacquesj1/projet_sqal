            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_read_timeout 120s;
        }
    }

    # -----------------------------------------------------------------------
    # Port 8083 — Traçabilité Frontend
