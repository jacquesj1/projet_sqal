            proxy_read_timeout 120s;
        }
    }

    # -----------------------------------------------------------------------
    # Port 8084 — SQAL Frontend (React + Vite)
    # -----------------------------------------------------------------------
    server {
        listen 8084;
        server_name _;

        location /api/ {
