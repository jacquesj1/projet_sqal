# ==============================================================================
# Nginx NAS Configuration - Système Gaveurs V3.0 (Démo LAN)
# HTTP uniquement - pas de SSL - pas de domaine
# ==============================================================================
# Accès depuis le réseau local :
#   http://DEEP_NAS:8081  → Gaveurs Frontend
#   http://DEEP_NAS:8082  → Euralis Frontend
#   http://DEEP_NAS:8083  → Traçabilité Frontend
#   http://DEEP_NAS:8084  → SQAL Frontend
#   http://DEEP_NAS:8085  → Control Panel
# Chaque bloc proxy /api/ et /ws/ vers le backend FastAPI (backend:8000)
# ==============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        image/svg+xml font/truetype font/opentype;

    client_max_body_size 20m;

    # -----------------------------------------------------------------------
    # Upstreams
    # -----------------------------------------------------------------------
    upstream backend_api {
        server backend:8000;
        keepalive 16;
    }

    upstream gaveurs_ui {
        server frontend-gaveurs:3000;
    }

    upstream euralis_ui {
        server frontend-euralis:3001;
    }

    upstream traceability_ui {
        server frontend-traceability:3003;
    }

    upstream sqal_ui {
        server frontend-sqal:80;
    }

    upstream controlpanel_ui {
        server control-panel:80;
    }

    # -----------------------------------------------------------------------
    # Macros communes (proxy headers + WebSocket upgrade)
    # -----------------------------------------------------------------------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # -----------------------------------------------------------------------
    # Port 8088 — Gaveurs Frontend (8081 occupé par Squid/ProxyServer DSM)
    # -----------------------------------------------------------------------
    server {
        listen 8088;
        server_name _;

        # API REST — préserve le préfixe /api/
        location /api/ {
            proxy_pass         http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 120s;
        }

        # WebSocket
        location /ws/ {
            proxy_pass          http://backend_api;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection $connection_upgrade;
            proxy_set_header    Host       $host;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # Frontend Next.js (SSR + Next.js hot paths)
        location /_next/ {
            proxy_pass         http://gaveurs_ui;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
        }

        location / {
            proxy_pass         http://gaveurs_ui;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_read_timeout 120s;
        }
    }

    # -----------------------------------------------------------------------
    # Port 8082 — Euralis Frontend
    # -----------------------------------------------------------------------
    server {
        listen 8082;
        server_name _;

        location /api/ {
            proxy_pass         http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 120s;
        }

        location /ws/ {
            proxy_pass          http://backend_api;
